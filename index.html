<!DOCTYPE html>
<head>
	<title>漫画</title>
	<meta charset="UTF-8">
	<style>
		body {
			background-image: url(10.png);
			background-size: 110%;
			background-attachment: fixed;
		}
		#top {
			width: 100%;
			height: 10%;
		}
		div {
			width: 60%;
			height: 1200px;
			background-color: rgba(255, 255, 255, 0.5);
			font-weight: bold;
			position: relative;
			text-align: center;
			left: 30%;
			border-radius: 15px;
		}
		h2 {
            width: 100%;
            height: 5%;
            text-align: center;
            font-size: 60px;
            font-family: "Ma Shan Zheng";
            color: rgba(26, 25, 24, 0.7);
            border-color: rgba(0, 0, 0, 0.3);
            border-width: 5%;
            border-style: solid;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.7);
		}
		#guide {
			width: 300px;
			height: 400px;
			position: fixed;
			left: 5%;
			top: 30%;
		}
		a {
			text-decoration: none;
			color: rgb(233, 127, 121);
		}
		a:hover{
			color:rgb(224, 84, 46);
		}
	</style>
</head>
<body>
	<img id="top" src="9.png">
	<div id="guide">
		<h3><a href="#chapter1">第一章 厉害的胖达</a></h3>
		<h3><a href="#chapter2">第二章 绝不迟到</a></h3>
		<h3><a href="#chapter3">第三章 无限循环</a></h3>
		<h3><a href="#chapter4">第四章 帽子控</a></h3>
		<h3><a href="#chapter5">第五章 合影</a></h3>
		<h3><a href="#chapter6">第六章 循序渐进</a></h3>
		<h3><a href="#chapter7">第七章 觉悟</a></h3>
		<h3><a href="#chapter8">第八章 拔萝卜</a></h3>
	</div>
	<div>
		<h2 id="chapter1">厉害的胖达</h2>
		<img src="1.png">
 	</div>
	<div>
		<h2 id="chapter2">绝不迟到</h2>
		<img src="2.png">
  	</div>
	<div>
		<h2 id="chapter3">无限循环</h2>
		<img src="3.png">
  	</div>
	<div>
		<h2 id="chapter4">帽子控</h2>
		<img src="4.png">
  	</div>
	<div>
		<h2 id="chapter5">合影</h2>
		<img src="5.png">
	</div>
	<div>
		<h2 id="chapter6">循序渐进</h2>
		<img src="6.png">
	</div>
	<div>
		<h2 id="chapter7">觉悟</h2>
		<img src="7.png">
	</div>
	<div>
		<h2 id="chapter8">拔萝卜</h2>
		<img src="8.png">
	</div>
</body>
</html>
